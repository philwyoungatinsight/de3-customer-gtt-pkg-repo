customer-gtt-pkg:
  _provides_capability:
  - customer-gtt-pkg: 1.3.0
  _requires_capability:
  - k8s-pkg: ">=1.2.0"

  config_params:
    # ── Chicago Dell cluster — ALL settings inherited by every unit under this path ──
    customer-gtt-pkg/_stack/k8s/gtt-halo/chicago-dell:
      _provider: helm
      _wave: k8s.apps
      _env: prod
      _region: us-central
      # Provider auth: cluster_name → $_DYNAMIC_DIR/kubeconfig/chicago-dell.yaml
      _provider_helm_cluster_name: chicago-dell
      # Modules: helm_release is in k8s-pkg (not found via default 3-tier resolution)
      _modules_dir: k8s-pkg/_modules
      # tg-scripts: kubeconfig and tunnel scripts live in k8s-pkg
      _tg_scripts_dir: k8s-pkg/_tg_scripts
      # Namespace for all chart units
      namespace: acme-product
      create_namespace: true
      chart_wait: true
      chart_timeout: 300
      # Absolute path to gtt-halo-project helm charts on the developer machine.
      # Override in your own config_source if your checkout is elsewhere.
      helm_charts_base_dir: /home/pyoung/git/gtt-halo-project/k8s/helm-charts
      # Kubeconfig unit config (read by kubeconfig-from-sops tg-script).
      # The full kubeconfig YAML is stored in SOPS under the key below.
      kubeconfig_cluster_name: chicago-dell
      kubeconfig_sops_key: chicago_dell_kubeconfig
      # SSH tunnel config (read by ensure-tunnel tg-script).
      # Cluster API server is only reachable via SSH port-forward.
      tunnel_ssh_host: 10.100.16.11
      tunnel_ssh_user: root
      tunnel_local_port: 10443
      # MinIO bucket names — shared by initializer, server, trainer, evaluator.
      minio_training_dataset_bucket: training-dataset-2
      minio_models_bucket: trained-models
      minio_training_results_bucket: training-results
      minio_train_eval_config_bucket: training-eval-config
      minio_mlflow_artifact_bucket: mlflow-311

    # Kubeconfig and tunnel units use null provider (tg-script, no helm provider needed).
    # Override _modules_dir back to framework-pkg for null_resource__run-script.
    customer-gtt-pkg/_stack/k8s/gtt-halo/chicago-dell/kubeconfig:
      _provider: "null"
      _modules_dir: _framework-pkg/_modules

    customer-gtt-pkg/_stack/k8s/gtt-halo/chicago-dell/tunnel:
      _provider: "null"
      _modules_dir: _framework-pkg/_modules

    # ── Chart-specific config ──────────────────────────────────────────────────
    # Re-establish helm provider for all chart units inside kubeconfig/charts/.
    # Overrides the _provider: "null" inherited from chicago-dell/kubeconfig.
    customer-gtt-pkg/_stack/k8s/gtt-halo/chicago-dell/kubeconfig/charts:
      _provider: helm
      _modules_dir: k8s-pkg/_modules

    customer-gtt-pkg/_stack/k8s/gtt-halo/chicago-dell/kubeconfig/charts/minio:
      release_name: acme-product-minio
      chart_subpath: acme-product-minio/build_scripts/app_chart

    customer-gtt-pkg/_stack/k8s/gtt-halo/chicago-dell/kubeconfig/charts/minio-initializer:
      release_name: acme-product-minio-initializer
      chart_subpath: acme-product-minio-initializer/build_scripts/job_chart

    customer-gtt-pkg/_stack/k8s/gtt-halo/chicago-dell/kubeconfig/charts/test-db:
      release_name: acme-product-test-db
      chart_subpath: acme-product-test-db/build_scripts/db_chart

    customer-gtt-pkg/_stack/k8s/gtt-halo/chicago-dell/kubeconfig/charts/vllm:
      release_name: acme-product-vllm
      chart_subpath: acme-product-vllm/build_scripts/cfg-helm-chart
      # Empty models list: chart deploys in disabled state (no GPU pods created)
      vllm_models_json: "[]"

    customer-gtt-pkg/_stack/k8s/gtt-halo/chicago-dell/kubeconfig/charts/model-training/server:
      release_name: acme-product-model-training-server
      chart_subpath: acme-product-model-training-server/build_scripts/app_chart

    customer-gtt-pkg/_stack/k8s/gtt-halo/chicago-dell/kubeconfig/charts/model-training/trainer:
      release_name: acme-product-model-training-trainer
      chart_subpath: acme-product-model-training-trainer/build_scripts/job_chart
      hf_model_cache_enabled: true
      hf_model_cache_size: 250Gi
      gpu_enabled: true

    customer-gtt-pkg/_stack/k8s/gtt-halo/chicago-dell/kubeconfig/charts/model-training/evaluator:
      release_name: acme-product-model-training-evaluator
      chart_subpath: acme-product-model-training-evaluator/build_scripts/job_chart
      hf_model_cache_enabled: false

    # ── Minikube cluster (local dev) ─────────────────────────────────────────
    # Uses kubeconfig-from-cli: minikube manages credentials locally, no SOPS needed.
    customer-gtt-pkg/_stack/k8s/gtt-halo/minikube:
      _provider: helm
      _wave: k8s.apps
      _env: dev
      _region: local
      _provider_helm_cluster_name: minikube
      _modules_dir: k8s-pkg/_modules
      _tg_scripts_dir: k8s-pkg/_tg_scripts
      namespace: acme-product
      create_namespace: true
      chart_wait: true
      chart_timeout: 300
      helm_charts_base_dir: /home/pyoung/git/gtt-halo-project/k8s/helm-charts
      kubeconfig_cluster_name: minikube
      kubeconfig_cli_command: "minikube update-context --kubeconfig {kubeconfig_path}"

    customer-gtt-pkg/_stack/k8s/gtt-halo/minikube/kubeconfig:
      _provider: "null"
      _modules_dir: _framework-pkg/_modules

    customer-gtt-pkg/_stack/k8s/gtt-halo/minikube/kubeconfig/charts:
      _provider: helm
      _modules_dir: k8s-pkg/_modules

    customer-gtt-pkg/_stack/k8s/gtt-halo/minikube/kubeconfig/charts/minio:
      release_name: acme-product-minio
      chart_subpath: acme-product-minio/build_scripts/app_chart
